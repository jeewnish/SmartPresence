version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: smartpresence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartpresence
      POSTGRES_USER: smartpresence_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Dev@Pass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpresence_user -d smartpresence"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: smartpresence-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    # NO HEALTHCHECK - Keycloak starts fine, we just can't check it

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpresence-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started # Changed from service_healthy
    environment:
      DB_USERNAME: smartpresence_user
      DB_PASSWORD: ${DB_PASSWORD:-Dev@Pass123}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartpresence
      KEYCLOAK_ISSUER_URI: http://keycloak:8180/realms/smartpresence
      KEYCLOAK_ADMIN_CLIENT_ID: smartpresence-admin-cli
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-smartpresence-admin-secret}
      KEYCLOAK_REALM: smartpresence
      KEYCLOAK_ADMIN_URL: http://keycloak:8180
      BEACON_API_KEY: ${BEACON_API_KEY:-dev-beacon-key-change-in-prod}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/var/log/smartpresence

volumes:
  postgres_data:
  keycloak_data:
  app_logs:
